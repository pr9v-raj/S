<!DOCTYPE html>
<html>
<head>
    <title>My Study Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; margin-top: 0; }
        .btn { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; text-decoration: none; display: block; text-align: center; }
        .token-box { background: #0d1117; padding: 10px; border-radius: 4px; font-size: 12px; color: #8b949e; word-break: break-all; margin-top: 10px; border: 1px dashed #30363d; }
        .copy-btn { background: #30363d; font-size: 12px; padding: 5px; margin-top: 5px; cursor: pointer; color: #c9d1d9; border: none; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 id="title">Loading Batch...</h1>
            <p id="details">Connecting to PWSphere API...</p>
            <div id="points"></div>
            
            <hr style="border: 0; border-top: 1px solid #30363d; margin: 20px 0;">
            
            <h3>School PC Login</h3>
            <p style="font-size: 0.9em;">1. Open <b>pwsphere.vercel.app</b><br>2. Press <b>F12</b> > <b>Console</b><br>3. Click button below & paste!</p>
            <button class="btn" onclick="copyLoginScript()">📋 Copy Console Script</button>
        </div>
    </div>

    <script>
        const BATCH_ID = "6779345c20fa0756e4a7fd08";
        const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWRiYjAwOTRmZDg0MDVhMzU1ODNhMTQiLCJuYW1lIjoiUHJhbmF2ICIsInRlbGVncmFtSWQiOm51bGwsInBob3RvVXJsIjoiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMzYwNy8zNjA3NDQ0LnBuZyIsImlhdCI6MTc3NjM1MjM3OSwiZXhwIjoxNzc3NjQ4Mzc5fQ.DRp_V6MIpgjY4BH8ka0PhvId3PaueMbtT9pQUmusQrA";
        
        // Fetching Data
        const api = `https://corsproxy.io/?${encodeURIComponent('https://pwsphere.vercel.app/api/BatchInfo?BatchId=' + BATCH_ID + '&Type=details')}`;
        
        fetch(api, { headers: { "Cookie": `accessToken=${TOKEN}` } })
            .then(r => r.json())
            .then(data => {
                document.getElementById('title').innerText = "🎯 " + data.slug.split('-').join(' ').toUpperCase();
                document.getElementById('details').innerText = "Status: " + data.status + " | Price: " + data.priceLabel;
                // Simple loop for pointers
                let html = "<ul>";
                data.config.card.descriptionPointers.forEach(p => { html += `<li>${p.text}</li>`; });
                document.getElementById('points').innerHTML = html + "</ul>";
            })
            .catch(e => { document.getElementById('title').innerText = "Token Expired!"; });

        // Script to log in on school computer
        function copyLoginScript() {
            const script = `document.cookie = "accessToken=${TOKEN}; path=/; domain=pwsphere.vercel.app"; location.href="https://pwsphere.vercel.app/study/batches/${BATCH_ID}"`;
            navigator.clipboard.writeText(script);
            alert("Script copied! Now paste it in the browser Console (F12) at school.");
        }
    </script>
</body>
</html>
