<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranav's Pro Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --border: #30363d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: auto; }
        .video-container { background: #000; width: 100%; aspect-ratio: 16/9; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); overflow: hidden; }
        video { width: 100%; height: 100%; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .list-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .list-item:hover { background: #1f242c; }
        .btn-back { background: transparent; color: var(--blue); border: 1px solid var(--blue); padding: 5px 12px; border-radius: 6px; cursor: pointer; display: none; }
        .tag { font-size: 11px; background: #23416f; color: #79c0ff; padding: 2px 8px; border-radius: 10px; }
        #status { font-size: 12px; color: #8b949e; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="title" style="font-size: 20px; margin: 0;">🚀 Lakshya JEE</h1>
        <button id="back-btn" class="btn-back" onclick="showSubjects()">← Back</button>
    </div>
    
    <div id="status">Connecting to API...</div>

    <div class="video-container">
        <video id="video" controls crossorigin playsinline></video>
    </div>

    <div class="card" id="main-content">
        <div id="list-container">
            <p style="text-align:center; padding: 20px;">Loading data...</p>
        </div>
    </div>
</div>

<script>
    const BATCH_ID = "6779345c20fa0756e4a7fd08";
    const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWRiYjAwOTRmZDg0MDVhMzU1ODNhMTQiLCJuYW1lIjoiUHJhbmF2ICIsInRlbGVncmFtSWQiOm51bGwsInBob3RvVXJsIjoiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMzYwNy8zNjA3NDQ0LnBuZyIsImlhdCI6MTc3NjM1MjM3OSwiZXhwIjoxNzc3NjQ4Mzc5fQ.DRp_V6MIpgjY4BH8ka0PhvId3PaueMbtT9pQUmusQrA";
    const PROXY = "https://api.allorigins.win/raw?url=";
    
    let allSubjects = [];

    // --- STEP 1: Load Subjects ---
    function loadBatch() {
        const url = `https://studyspark.site/api/batch/${BATCH_ID}/details`;
        fetch(PROXY + encodeURIComponent(url), {
            headers: { "Authorization": "Bearer " + TOKEN }
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('status').innerText = "✅ Batch Loaded. Choose a subject.";
            // PW Clones usually store subjects in data.subjects or data.details.subjects
            allSubjects = data.subjects || (data.details ? data.details.subjects : []);
            showSubjects();
        })
        .catch(err => {
            document.getElementById('status').innerText = "❌ Connection Failed. Check Token.";
        });
    }

    function showSubjects() {
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('title').innerText = "📚 Select Subject";
        const container = document.getElementById('list-container');
        container.innerHTML = "";

        allSubjects.forEach(sub => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${sub.name}</span> <span class="tag">VIEW</span>`;
            div.onclick = () => loadLectures(sub._id, sub.name);
            container.appendChild(div);
        });
    }

    // --- STEP 2: Load Lectures for a Subject ---
    function loadLectures(subId, subName) {
        document.getElementById('status').innerText = `Loading ${subName}...`;
        const container = document.getElementById('list-container');
        container.innerHTML = "<p style='text-align:center; padding:20px;'>Fetching lectures...</p>";

        // Most common pattern for StudySpark content
        const url = `https://studyspark.site/api/batch/${BATCH_ID}/subject/${subId}/contents`;

        fetch(PROXY + encodeURIComponent(url), {
            headers: { "Authorization": "Bearer " + TOKEN }
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('title').innerText = "📖 " + subName;
            document.getElementById('status').innerText = "Select a video to play.";
            container.innerHTML = "";

            const lectures = data.contents || data.lectures || data; // Handle different JSON structures
            
            if (!Array.isArray(lectures) || lectures.length === 0) {
                container.innerHTML = "<p style='text-align:center; padding:20px;'>No lectures found in this subject.</p>";
                return;
            }

            lectures.forEach(lec => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>${lec.name}</span> <span class="tag" style="background:#238636; color:white;">PLAY</span>`;
                div.onclick = () => playVideo(lec.url || lec.videoUrl);
                container.appendChild(div);
            });
        })
        .catch(err => {
            document.getElementById('status').innerText = "❌ Error fetching lectures.";
        });
    }

    // --- STEP 3: Video Player ---
    function playVideo(url) {
        if(!url) { alert("Video link not found!"); return; }
        const video = document.getElementById('video');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = url;
            video.play();
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Start the app
    loadBatch();
</script>

</body>
</html>
