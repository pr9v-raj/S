<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bypass Hub | Pranav Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --border: #30363d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding: 20px; }
        .wrapper { width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; }
        input { width: 100%; padding: 14px; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; color: white; margin: 20px 0; font-size: 14px; box-sizing: border-box; border: 1px solid var(--border); }
        .btn-main { background: var(--blue); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #timerUI { font-size: 40px; font-weight: bold; color: var(--blue); margin: 20px 0; display: none; }
        #log { text-align: left; background: #000; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 11px; height: 120px; overflow-y: auto; color: #8b949e; margin-top: 20px; border: 1px solid var(--border); }
        .result-area { display: none; margin-top: 25px; padding: 15px; background: #23863622; border: 1px solid var(--green); border-radius: 8px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Bypass Hub</h1>
    <p style="color:#8b949e; font-size: 12px;">Multi-Proxy Token Extractor</p>

    <input type="text" id="linkIn" placeholder="Paste arolinks.com/xxxx link here...">
    
    <button id="startBtn" class="btn-main" onclick="runBypass()">⚡ START BYPASS</button>

    <div id="timerUI">60</div>

    <div id="log">Ready. Use Codetabs Proxy.</div>

    <div id="resultArea" class="result-area">
        <b style="color:var(--green)">✅ TOKEN GENERATED</b>
        <p id="tokenDesc" style="font-size: 11px; margin: 10px 0; color: #8b949e;"></p>
        <button id="openBtn" class="btn-main" style="background:var(--green)">🔓 UNLOCK BATCH NOW</button>
    </div>
</div>

<script>
    // List of proxies to rotate if one is blocked
    const PROXY_LIST = [
        "https://api.codetabs.com/v1/proxy?quest=",
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?"
    ];
    
    let currentProxyIdx = 0;
    let finalTokenUrl = "";

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    async function tryFetch(url) {
        const proxy = PROXY_LIST[currentProxyIdx];
        addLog(`Using Proxy ${currentProxyIdx + 1}...`);
        try {
            const res = await fetch(proxy + encodeURIComponent(url));
            if (!res.ok) throw new Error("Blocked");
            return res;
        } catch (e) {
            if (currentProxyIdx < PROXY_LIST.length - 1) {
                currentProxyIdx++;
                return await tryFetch(url);
            }
            throw new Error("All proxies blocked by school firewall.");
        }
    }

    async function runBypass() {
        const url = document.getElementById('linkIn').value;
        if (!url) return alert("Paste the link!");

        document.getElementById('startBtn').style.display = "none";
        const timerUI = document.getElementById('timerUI');
        timerUI.style.display = "block";
        
        addLog("Initializing Multi-Proxy Engine...");
        
        let seconds = url.includes("enhuuo") ? 61 : 31;
        timerUI.innerText = seconds;

        try {
            // STEP 1: Handshake
            addLog("Pinging Arolinks...");
            await tryFetch(url);
            addLog("Handshake Successful.");

            // STEP 2: The Active Wait
            const countdown = setInterval(async () => {
                seconds--;
                timerUI.innerText = seconds;

                if (seconds <= 0) {
                    clearInterval(countdown);
                    timerUI.style.display = "none";
                    await fetchFinalToken(url);
                }
            }, 1000);

        } catch (e) {
            addLog(`Error: ${e.message}`);
            document.getElementById('startBtn').style.display = "block";
        }
    }

    async function fetchFinalToken(originalUrl) {
        addLog("Timer done. Scraping final response...");
        try {
            const res = await tryFetch(originalUrl);
            const html = await res.text();

            // Look for the success token in the HTML
            const tokenMatch = html.match(/success\?token=([a-zA-Z0-9._-]+)/);
            
            if (tokenMatch) {
                finalTokenUrl = "https://studyspark.site/" + tokenMatch[0];
                addLog("Token found in source code!");
            } else {
                addLog("Token not in HTML. Using direct ID redirect...");
                const id = originalUrl.split('/').pop();
                finalTokenUrl = `https://studyspark.site/success?id=${id}`;
            }
            
            showResult();
        } catch (err) {
            addLog("Final scrape failed.");
        }
    }

    function showResult() {
        document.getElementById('resultArea').style.display = "block";
        document.getElementById('tokenDesc').innerText = "Session validated for your IP.";
        document.getElementById('openBtn').onclick = () => {
            window.location.href = finalTokenUrl;
        };
    }
</script>

</body>
</html>
