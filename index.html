<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Portal | Lakshya JEE</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --border: #30363d; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .dashboard { width: 100%; max-width: 450px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        h1 { font-size: 20px; color: var(--blue); margin: 0 0 10px 0; display: flex; align-items: center; gap: 8px; }
        .tag { font-size: 12px; background: #23416f; color: #79c0ff; padding: 2px 8px; border-radius: 20px; font-weight: normal; }
        .info-grid { margin: 20px 0; border-top: 1px solid var(--border); padding-top: 15px; }
        .info-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .label { color: #8b949e; }
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 15px; text-align: center; font-size: 14px; }
        .btn-green { background-color: var(--green); color: white; }
        .btn-green:hover { background-color: #2ea043; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--blue); margin-top: 10px; }
        .btn-outline:hover { background: #1f242c; }
        #status-msg { font-size: 12px; text-align: center; margin-top: 15px; color: #8b949e; }
        ul { padding-left: 18px; font-size: 13px; color: #8b949e; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1 id="batch-name">Loading... <span class="tag">JEE 2027</span></h1>
    
    <div id="loading-ui">Fetching batch details from PWSphere...</div>

    <div id="main-ui" style="display:none;">
        <div class="info-grid">
            <div class="info-item"><span class="label">User:</span> <span>Pranav</span></div>
            <div class="info-item"><span class="label">Status:</span> <span id="batch-status" style="color:#22c55e"></span></div>
            <div class="info-item"><span class="label">Start Date:</span> <span id="start-date"></span></div>
        </div>
        
        <div id="pointers"></div>

        <button class="btn btn-green" onclick="copyLogin()">📋 Copy School Login Script</button>
        <a id="direct-link" href="#" target="_blank" class="btn btn-outline">🌐 Open Batch Directly</a>
    </div>

    <div id="status-msg">Token valid until ~April 28</div>
</div>

<script>
    // --- CONFIGURATION ---
    const BATCH_ID = "6779345c20fa0756e4a7fd08";
    const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWRiYjAwOTRmZDg0MDVhMzU1ODNhMTQiLCJuYW1lIjoiUHJhbmF2ICIsInRlbGVncmFtSWQiOm51bGwsInBob3RvVXJsIjoiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMzYwNy8zNjA3NDQ0LnBuZyIsImlhdCI6MTc3NjM1MjM3OSwiZXhwIjoxNzc3NjQ4Mzc5fQ.DRp_V6MIpgjY4BH8ka0PhvId3PaueMbtT9pQUmusQrA";
    const BASE_URL = `https://pwsphere.vercel.app/study/batches/${BATCH_ID}`;
    
    // --- FETCH DATA ---
    const api = `https://corsproxy.io/?${encodeURIComponent('https://pwsphere.vercel.app/api/BatchInfo?BatchId=' + BATCH_ID + '&Type=details')}`;
    
    fetch(api, { headers: { "Authorization": "Bearer " + TOKEN } })
        .then(r => r.json())
        .then(data => {
            document.getElementById('loading-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            
            document.getElementById('batch-name').innerHTML = `🎯 ${data.slug.split('-')[0].toUpperCase()} <span class="tag">JEE 2027</span>`;
            document.getElementById('batch-status').innerText = data.status;
            document.getElementById('start-date').innerText = new Date(data.startDate).toLocaleDateString();
            document.getElementById('direct-link').href = BASE_URL;

            let html = "<ul>";
            data.config.card.descriptionPointers.slice(0, 3).forEach(p => { html += `<li>${p.text}</li>`; });
            document.getElementById('pointers').innerHTML = html + "</ul>";
        })
        .catch(e => {
            document.getElementById('loading-ui').innerHTML = "<b style='color:#f85149'>Connection Restricted</b><br>Data hidden for security. Use the button below to log in.";
            document.getElementById('main-ui').style.display = 'block';
        });

    // --- UTILITIES ---
    function copyLogin() {
        const script = `document.cookie = "accessToken=${TOKEN}; path=/; domain=pwsphere.vercel.app"; location.href="${BASE_URL}"`;
        
        // Modern copy method
        const el = document.createElement('textarea');
        el.value = script;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

        alert("✅ SCRIPT COPIED!\n\n1. Go to the school PC browser.\n2. Open pwsphere.vercel.app\n3. Press F12 -> Console.\n4. Paste & press Enter.");
    }
</script>

</body>
</html>
