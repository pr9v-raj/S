<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Portal | Lakshya JEE</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --blue: #58a6ff;
            --green: #238636;
            --border: #30363d;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: var(--blue);
            margin: 0;
            font-size: 22px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: #23416f;
            color: #79c0ff;
            margin-top: 8px;
        }
        .data-section {
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed var(--border);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .label { color: #8b949e; }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .btn-main { background: var(--green); color: white; }
        .btn-main:hover { background: #2ea043; }
        .btn-sub { background: transparent; border: 1px solid var(--border); color: var(--blue); }
        .btn-sub:hover { background: #1f242c; }
        .footer {
            font-size: 11px;
            color: #8b949e;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="b-name">Lakshya JEE 2027</h1>
        <div class="status-badge" id="b-status">Active Session</div>
    </div>

    <div class="data-section" id="data-ui">
        <div class="info-row">
            <span class="label">User:</span>
            <span>Pranav</span>
        </div>
        <div class="info-row">
            <span class="label">Token Expiry:</span>
            <span style="color: #f85149;">April 28, 2026</span>
        </div>
        <div id="loader" style="font-size: 12px; text-align: center; margin-top: 10px;">
            Connecting to API...
        </div>
    </div>

    <button class="btn btn-main" onclick="copyBypass()">📋 Copy Bypass Script</button>
    <a href="https://studyspark.site/batches/6779345c20fa0756e4a7fd08" target="_blank" class="btn btn-sub">🌐 Open StudySpark</a>

    <div class="footer">
        Step: 1. Copy Script | 2. Open Site | 3. F12 -> Console -> Paste
    </div>
</div>

<script>
    // YOUR LIVE DATA
    const BATCH_ID = "6779345c20fa0756e4a7fd08";
    const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2OWRiYjAwOTRmZDg0MDVhMzU1ODNhMTQiLCJuYW1lIjoiUHJhbmF2ICIsInRlbGVncmFtSWQiOm51bGwsInBob3RvVXJsIjoiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMzYwNy8zNjA3NDQ0LnBuZyIsImlhdCI6MTc3NjM1MjM3OSwiZXhwIjoxNzc3NjQ4Mzc5fQ.DRp_V6MIpgjY4BH8ka0PhvId3PaueMbtT9pQUmusQrA";
    
    // API CALL LOGIC
    const api_url = `https://studyspark.site/api/batch/${BATCH_ID}/details`;
    const proxy = "https://api.allorigins.win/raw?url=";

    fetch(proxy + encodeURIComponent(api_url), {
        headers: { "Authorization": "Bearer " + TOKEN }
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('b-name').innerText = data.name || "Lakshya JEE 2027";
        document.getElementById('b-status').innerText = "Direct Access: Online";
    })
    .catch(err => {
        document.getElementById('loader').innerText = "API direct access restricted by browser. Use bypass button below.";
        document.getElementById('loader').style.color = "#8b949e";
    });

    // BYPASS LOGIC
    function copyBypass() {
        const bypassCode = `document.cookie = "accessToken=${TOKEN}; path=/; domain=studyspark.site"; location.href="https://studyspark.site/batches/${BATCH_ID}";`;
        
        const el = document.createElement('textarea');
        el.value = bypassCode;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

        alert("✅ BYPASS SCRIPT COPIED!\n\n1. Open StudySpark\n2. Press F12 -> Console\n3. Paste and press Enter.");
    }
</script>

</body>
</html>
