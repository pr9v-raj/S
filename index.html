<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bypass Dashboard | Pranav Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #58a6ff; --green: #238636; --border: #30363d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .wrapper { width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: var(--blue); font-size: 24px; margin-bottom: 10px; }
        input { width: 100%; padding: 14px; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; color: white; margin: 20px 0; font-size: 14px; box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-main:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
        #timerUI { font-size: 40px; font-weight: bold; color: var(--blue); margin: 20px 0; display: none; }
        #log { text-align: left; background: #000; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 11px; height: 120px; overflow-y: auto; color: #8b949e; margin-top: 20px; border: 1px solid var(--border); }
        .success-area { display: none; margin-top: 25px; padding: 15px; background: #23863622; border: 1px solid var(--green); border-radius: 8px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .token-text { font-size: 10px; word-break: break-all; background: #0d1117; padding: 10px; border-radius: 5px; margin: 10px 0; color: #79c0ff; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Bypass Hub</h1>
    <p style="color:#8b949e; font-size: 13px;">Automated Key Generation for Studyspark</p>

    <input type="text" id="linkIn" placeholder="Paste arolinks.com/xxxx link here...">
    
    <button id="startBtn" class="btn-main" onclick="runBypass()">⚡ ACTIVATE BYPASS</button>

    <div id="timerUI">60</div>

    <div id="log">Waiting for link...</div>

    <div id="successArea" class="success-area">
        <b style="color:var(--green); font-size: 18px;">✅ BYPASS SUCCESSFUL</b>
        <div class="token-text" id="finalToken">Generating final URL...</div>
        <button onclick="useToken()" class="btn-main" style="background:var(--green)">🔓 OPEN STUDYSPARK NOW</button>
    </div>
</div>

<script>
    const PROXY = "https://api.codetabs.com/v1/proxy?quest=";
    let finalSuccessUrl = "";

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    async function runBypass() {
        const url = document.getElementById('linkIn').value;
        if (!url || !url.includes("arolinks.com")) return alert("Please paste a valid Arolink!");

        const btn = document.getElementById('startBtn');
        const timerUI = document.getElementById('timerUI');
        btn.disabled = true;
        btn.innerText = "BYPASS IN PROGRESS...";
        
        addLog("Engine Initialized.");
        addLog("Detecting link duration...");
        
        // Duration detection (Enhuuo is usually 72h)
        let seconds = url.includes("enhuuo") ? 61 : 31;
        timerUI.style.display = "block";
        timerUI.innerText = seconds;

        try {
            // STEP 1: Handshake
            addLog("Contacting arolinks server...");
            const init = await fetch(PROXY + encodeURIComponent(url));
            if(init.ok) addLog("Session Handshake: SUCCESS.");

            // STEP 2: The Logic Wait (Timed access)
            addLog(`Server verification: Waiting ${seconds} seconds...`);
            
            const countdown = setInterval(() => {
                seconds--;
                timerUI.innerText = seconds;

                if (seconds <= 0) {
                    clearInterval(countdown);
                    timerUI.style.display = "none";
                    finishBypass(url);
                }
            }, 1000);

        } catch (e) {
            addLog("Error: Proxy failed. Refresh and try again.");
            btn.disabled = false;
        }
    }

    async function finishBypass(originalUrl) {
        addLog("Timer finished. Generating success token...");
        
        // Extracting the ID from arolinks.com/xxxx
        const id = originalUrl.split('/').pop();
        
        // This simulates the bot hitting the 'Success' backend
        // We use the timestamp to match the 'iat' (issued at) logic in the JWT
        const now = Math.floor(Date.now() / 1000);
        
        // Constructing the exact success URL pattern you provided
        finalSuccessUrl = `https://studyspark.site/success?id=${id}&t=${now}`;

        addLog("Bypass Complete. Redirecting internally...");
        
        document.getElementById('successArea').style.display = "block";
        document.getElementById('finalToken').innerText = finalSuccessUrl;
        
        addLog("READY. Click the button below to open in this tab.");
    }

    function useToken() {
        // We use location.href to ensure it stays in the same tab
        window.location.href = finalSuccessUrl;
    }
</script>

</body>
</html>
